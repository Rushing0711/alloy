<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Worktree — 物理隔离，并行开发</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; } html { width: 100%; height: 100%; background: #060504; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1A1815;
    --cyan: #00E0B4;
    --purple: #9070FF;
    --fusion: #F0DDA8;
    --fusion-bright: #FFF0C8;
    --text: #F8F6F2;
    --text2: #B0ACA6;
    --text3: #807A74;
  }

  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: var(--bg);
    font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .bg-base { position: absolute; inset: 0; background: var(--bg); }
  .bg-metal {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 800px 600px at 20% 30%, rgba(60,58,52,0.22) 0%, transparent 100%),
      radial-gradient(ellipse 600px 500px at 80% 70%, rgba(50,48,42,0.14) 0%, transparent 100%),
      radial-gradient(ellipse 1000px 400px at 50% 40%, rgba(232,213,160,0.04) 0%, transparent 55%),
      radial-gradient(ellipse 500px 500px at 25% 55%, rgba(0,212,170,0.02) 0%, transparent 55%),
      radial-gradient(ellipse 500px 500px at 75% 55%, rgba(124,92,252,0.02) 0%, transparent 55%);
  }
  .bg-brushed {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.4;
    background: repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.005) 1px, rgba(255,255,255,0.005) 2px);
  }
  .bg-vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(10,9,7,0.4) 70%, rgba(8,7,5,0.7) 100%);
  }
  .bg-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.022;
    background-image: linear-gradient(rgba(207,207,216,0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(207,207,216,0.4) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .bg-curves { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

  .header-title {
    font-weight: 700; font-size: 48px; letter-spacing: 0.03em;
    background: linear-gradient(180deg, #D8D8E4 0%, #C0C0CE 30%, #E0E0EC 48%, #B0B0BE 52%, #C8C8D6 70%, #A0A0B0 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
  }

  /* 左右面板 */
  .panel-wrap {
    position: absolute; top: 160px; left: 50%; transform: translateX(-50%); z-index: 4;
    display: flex; gap: 60px; width: 1400px;
  }
  .panel {
    flex: 1; border-radius: 6px; padding: 40px 36px; position: relative;
  }
  .panel-left {
    border: 1px solid rgba(0,0,0,0.06);
    background: rgba(20,19,17,0.5);
  }
  .panel-right {
    border: 1px solid rgba(0,212,170,0.08);
    background: linear-gradient(180deg, rgba(0,212,170,0.02) 0%, rgba(20,19,17,0.5) 30%);
  }

  .panel-badge {
    display: inline-block; padding: 4px 12px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500;
    letter-spacing: 0.06em; margin-bottom: 20px;
  }
  .panel-left .panel-badge { background: rgba(138,136,130,0.1); color: var(--text3); }
  .panel-right .panel-badge { background: rgba(0,212,170,0.1); color: var(--cyan); }

  .panel-title { font-weight: 700; font-size: 28px; letter-spacing: 0.02em; color: var(--text); margin-bottom: 8px; }
  .panel-sub { font-size: 15px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }

  /* 左侧示意: stash/checkout 混乱 */
  .diagram { position: relative; height: 320px; }
  .diagram-box {
    position: absolute; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1);
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.04em;
  }
  .d-main-branch {
    top: 10px; left: 20px; right: 20px; height: 36px;
    background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.12);
    color: var(--text2); display: flex; align-items: center;
  }
  .d-branch { font-size: 12px; }
  .d-branch-a {
    top: 66px; left: 40px; width: 180px; height: 32px;
    background: rgba(0,212,170,0.03); border-color: rgba(0,212,170,0.1);
    color: rgba(0,212,170,0.5); display: flex; align-items: center;
  }
  .d-branch-b {
    top: 118px; left: 60px; width: 160px; height: 32px;
    background: rgba(124,92,252,0.03); border-color: rgba(124,92,252,0.1);
    color: rgba(124,92,252,0.5); display: flex; align-items: center;
  }
  .d-branch-c {
    top: 170px; left: 80px; width: 220px; height: 32px;
    background: rgba(245,230,192,0.03); border-color: rgba(245,230,192,0.1);
    color: rgba(245,230,192,0.5); display: flex; align-items: center;
  }
  /* 混乱指示线 */
  .d-chaos-line {
    position: absolute; pointer-events: none;
  }
  .d-stash {
    top: 236px; left: 60px;
    font-size: 13px; color: rgba(0,0,0,0.25);
    font-family: 'JetBrains Mono', monospace;
  }
  .d-stash span { display: block; margin-bottom: 3px; }

  /* 右侧示意: worktree 隔离 */
  .wt-dirs {
    display: flex; gap: 12px; margin-top: 8px;
  }
  .wt-dir {
    flex: 1; border-radius: 4px; border: 1px solid rgba(0,0,0,0.08);
    background: rgba(20,19,17,0.4); padding: 18px 14px; text-align: center;
  }
  .wt-dir-icon { width: 28px; height: 28px; margin: 0 auto 10px; }
  .wt-dir-name {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text3);
    letter-spacing: 0.04em; margin-bottom: 6px;
  }
  .wt-dir-feat {
    font-size: 14px; color: var(--text2); margin-bottom: 4px;
  }

  .wt-dir.wt1 { border-color: rgba(0,212,170,0.12); }
  .wt-dir.wt1 .wt-dir-name { color: var(--cyan); }
  .wt-dir.wt2 { border-color: rgba(124,92,252,0.12); }
  .wt-dir.wt2 .wt-dir-name { color: var(--purple); }
  .wt-dir.wt3 { border-color: rgba(245,230,192,0.12); }
  .wt-dir.wt3 .wt-dir-name { color: var(--fusion-bright); }

  /* SVG图: 左侧混乱 */
  .chaos-svg { position: absolute; top: 20px; left: 0; right: 0; height: 280px; pointer-events: none; }

  /* 分隔线 */
  .vs-divider {
    position: absolute; left: 50%; top: 240px; bottom: 120px; width: 1px; z-index: 3; pointer-events: none;
    background: linear-gradient(180deg, transparent, rgba(207,207,216,0.06), transparent);
  }

  /* 底部 */
  .footer-bar {
    position: absolute; bottom: 42px; left: 80px; right: 80px; z-index: 4;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-line { flex: 1; height: 1px; background: rgba(207,207,216,0.06); }
  .footer-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.06em; color: var(--text3); padding: 0 32px; white-space: nowrap; }

  .droplet { position: absolute; border-radius: 50%; pointer-events: none; z-index: 2; }
  @keyframes floatDrop { 0%,100%{transform:translateY(0);opacity:0.10;} 50%{transform:translateY(-8px);opacity:0.20;} }
</style>
</head>
<body>

<div class="bg-base"></div>
<div class="bg-metal"></div>
<div class="bg-brushed"></div>
<div class="bg-vignette"></div>
<div class="bg-grid"></div>

<svg class="bg-curves" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFusion" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00D4AA" stop-opacity="0.06"/>
      <stop offset="48%" stop-color="#F5E6C0" stop-opacity="0.08"/>
      <stop offset="52%" stop-color="#F5E6C0" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#7C5CFC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M -100,240 C 260,190 420,320 700,250 C 880,200 1000,340 1100,290 C 1200,240 1360,380 1620,300 C 1780,250 1900,350 2020,300"
        stroke="url(#bgFusion)" stroke-width="0.8" fill="none" opacity="0.30"/>
  <path d="M -80,800 C 300,750 460,870 740,810 C 920,770 1000,890 1100,840 C 1200,790 1340,940 1580,870 C 1740,830 1860,920 2020,870"
        stroke="url(#bgFusion)" stroke-width="0.6" fill="none" opacity="0.22"/>
</svg>

<div class="droplet" style="width:4px;height:4px;top:13%;left:15%;background:radial-gradient(circle at 40% 40%,rgba(0,212,170,0.6) 0%,transparent 70%);animation:floatDrop 8s ease-in-out infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:15%;right:17%;background:radial-gradient(circle at 40% 40%,rgba(124,92,252,0.5) 0%,transparent 70%);animation:floatDrop 9s ease-in-out 2s infinite;"></div>
<div class="droplet" style="width:5px;height:5px;top:10%;left:49%;background:radial-gradient(circle at 40% 40%,rgba(245,230,192,0.5) 0%,transparent 70%);animation:floatDrop 7s ease-in-out 1s infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:86%;left:25%;background:radial-gradient(circle at 40% 40%,rgba(0,212,170,0.5) 0%,transparent 70%);animation:floatDrop 10s ease-in-out 3s infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:84%;right:21%;background:radial-gradient(circle at 40% 40%,rgba(124,92,252,0.5) 0%,transparent 70%);animation:floatDrop 10s ease-in-out 4s infinite;"></div>

<div style="position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:5;">
  <h1 class="header-title">Worktree — 物理隔离，并行开发</h1>
</div>

<div class="panel-wrap">

  <!-- 左侧: 不用 worktree -->
  <div class="panel panel-left">
    <div class="panel-badge">无 Worktree</div>
    <div class="panel-title">Stash / Checkout 来回切</div>
    <div class="panel-sub">多个任务混在同一个工作区，随时可能污染 main 分支</div>

    <svg class="chaos-svg" viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg">
      <!-- main 条 -->
      <rect x="30" y="18" width="560" height="34" rx="4" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>
      <text x="50" y="40" fill="rgba(0,0,0,0.5)" font-family="JetBrains Mono,monospace" font-size="13">main</text>
      <!-- 分支 A -->
      <rect x="60" y="74" width="200" height="30" rx="3" fill="rgba(0,212,170,0.03)" stroke="rgba(0,212,170,0.10)" stroke-width="1"/>
      <text x="76" y="94" fill="rgba(0,212,170,0.45)" font-family="JetBrains Mono,monospace" font-size="12">feat/a</text>
      <!-- 分支 B -->
      <rect x="90" y="126" width="180" height="30" rx="3" fill="rgba(124,92,252,0.03)" stroke="rgba(124,92,252,0.10)" stroke-width="1"/>
      <text x="106" y="146" fill="rgba(124,92,252,0.45)" font-family="JetBrains Mono,monospace" font-size="12">feat/b</text>
      <!-- 分支 C -->
      <rect x="130" y="178" width="240" height="30" rx="3" fill="rgba(245,230,192,0.03)" stroke="rgba(245,230,192,0.10)" stroke-width="1"/>
      <text x="146" y="198" fill="rgba(245,230,192,0.4)" font-family="JetBrains Mono,monospace" font-size="12">feat/c</text>

      <!-- 切换箭头 -->
      <path d="M 180,104 Q 220,130 200,126" stroke="rgba(0,0,0,0.12)" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
      <path d="M 180,156 L 230,178" stroke="rgba(0,0,0,0.10)" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

      <!-- stash 标签 -->
      <text x="370" y="76" fill="rgba(0,0,0,0.18)" font-family="JetBrains Mono,monospace" font-size="11">git stash</text>
      <text x="345" y="128" fill="rgba(0,0,0,0.15)" font-family="JetBrains Mono,monospace" font-size="11">git checkout</text>
      <text x="370" y="190" fill="rgba(0,0,0,0.12)" font-family="JetBrains Mono,monospace" font-size="11">git stash pop</text>

      <!-- 混乱标记 -->
      <text x="420" y="28" fill="rgba(0,0,0,0.06)" font-size="40">?</text>
      <text x="440" y="108" fill="rgba(0,0,0,0.05)" font-size="30">?</text>
      <text x="400" y="210" fill="rgba(0,0,0,0.04)" font-size="24">?</text>

      <!-- 底部警告 -->
      <text x="140" y="252" fill="rgba(0,0,0,0.14)" font-family="JetBrains Mono,monospace" font-size="12">&#9888; 可能污染 main</text>
    </svg>
  </div>

  <!-- 右侧: 用 worktree -->
  <div class="panel panel-right">
    <div class="panel-badge">With Worktree</div>
    <div class="panel-title">每个 Change 独立目录</div>
    <div class="panel-sub">物理隔离、互不干扰，main 分支始终保持干净</div>

    <div class="wt-dirs">
      <div class="wt-dir wt1">
        <svg class="wt-dir-icon" viewBox="0 0 28 28">
          <rect x="4" y="6" width="20" height="16" rx="3" fill="none" stroke="rgba(0,212,170,0.3)" stroke-width="1.2"/>
          <line x1="10" y1="11" x2="18" y2="11" stroke="rgba(0,212,170,0.25)" stroke-width="0.8"/>
          <line x1="10" y1="15" x2="16" y2="15" stroke="rgba(0,212,170,0.2)" stroke-width="0.8"/>
          <line x1="10" y1="19" x2="14" y2="19" stroke="rgba(0,212,170,0.15)" stroke-width="0.8"/>
        </svg>
        <div class="wt-dir-name">change-01/</div>
        <div class="wt-dir-feat">feat/a</div>
      </div>
      <div class="wt-dir wt2">
        <svg class="wt-dir-icon" viewBox="0 0 28 28">
          <rect x="4" y="6" width="20" height="16" rx="3" fill="none" stroke="rgba(124,92,252,0.3)" stroke-width="1.2"/>
          <line x1="10" y1="11" x2="18" y2="11" stroke="rgba(124,92,252,0.25)" stroke-width="0.8"/>
          <line x1="10" y1="15" x2="16" y2="15" stroke="rgba(124,92,252,0.2)" stroke-width="0.8"/>
          <line x1="10" y1="19" x2="14" y2="19" stroke="rgba(124,92,252,0.15)" stroke-width="0.8"/>
        </svg>
        <div class="wt-dir-name">change-02/</div>
        <div class="wt-dir-feat">feat/b</div>
      </div>
      <div class="wt-dir wt3">
        <svg class="wt-dir-icon" viewBox="0 0 28 28">
          <rect x="4" y="6" width="20" height="16" rx="3" fill="none" stroke="rgba(245,230,192,0.3)" stroke-width="1.2"/>
          <line x1="10" y1="11" x2="18" y2="11" stroke="rgba(245,230,192,0.25)" stroke-width="0.8"/>
          <line x1="10" y1="15" x2="16" y2="15" stroke="rgba(245,230,192,0.2)" stroke-width="0.8"/>
          <line x1="10" y1="19" x2="14" y2="19" stroke="rgba(245,230,192,0.15)" stroke-width="0.8"/>
        </svg>
        <div class="wt-dir-name">change-03/</div>
        <div class="wt-dir-feat">feat/c</div>
      </div>
    </div>

    <!-- main 受保护示意 -->
    <div style="margin-top:36px;padding:14px 18px;border-radius:4px;border:1px solid rgba(0,0,0,0.06);background:rgba(20,19,17,0.4);display:flex;align-items:center;gap:14px;">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <rect x="3" y="8" width="18" height="13" rx="2" fill="none" stroke="rgba(0,212,170,0.3)" stroke-width="1.2"/>
        <path d="M 7,8 V 6 a 5,5 0 0 1 10,0 v 2" fill="none" stroke="rgba(0,212,170,0.25)" stroke-width="1"/>
        <circle cx="12" cy="15" r="1.5" fill="rgba(0,212,170,0.4)"/>
      </svg>
      <div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--cyan);margin-bottom:2px;">main 分支受保护</div>
        <div style="font-size:13px;color:var(--text3);">每个 change 在自己的 worktree 中独立开发，互不干扰</div>
      </div>
    </div>
  </div>

</div>

<!-- 底部 -->
<div class="footer-bar">
  <div class="footer-line"></div>
  <span class="footer-text">Alloy · Worktree 物理隔离并行开发</span>
  <div class="footer-line"></div>
</div>

<script>
(function(){
  var W=1920,H=1080;
  function fit(){var s=Math.min(innerWidth/W,innerHeight/H);document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.body.style.width=W+'px';document.body.style.height=H+'px';document.body.style.position='absolute';document.body.style.top=((innerHeight-H*s)/2)+'px';document.body.style.left=((innerWidth-W*s)/2)+'px';}
  fit();window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
