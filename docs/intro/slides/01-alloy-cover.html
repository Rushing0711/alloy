<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Alloy — AI 编码 Agent 的驾驶舱</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; } html { width: 100%; height: 100%; background: #060504; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1A1815;
    --cyan: #00E0B4;
    --purple: #9070FF;
    --fusion: #F0DDA8;
    --fusion-bright: #FFF0C8;
    --text: #F8F6F2;
    --text2: #B0ACA6;
    --text3: #807A74;
  }

  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: var(--bg);
    font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* 背景 */
  .bg-base { position: absolute; inset: 0; background: var(--bg); }
  .bg-metal {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 800px 600px at 20% 30%, rgba(60,58,52,0.22) 0%, transparent 100%),
      radial-gradient(ellipse 600px 500px at 80% 70%, rgba(50,48,42,0.14) 0%, transparent 100%),
      radial-gradient(ellipse 1000px 400px at 50% 40%, rgba(232,213,160,0.04) 0%, transparent 55%),
      radial-gradient(ellipse 500px 500px at 25% 55%, rgba(0,212,170,0.02) 0%, transparent 55%),
      radial-gradient(ellipse 500px 500px at 75% 55%, rgba(124,92,252,0.02) 0%, transparent 55%);
  }
  .bg-brushed {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.4;
    background: repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.005) 1px, rgba(255,255,255,0.005) 2px);
  }
  .bg-vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(10,9,7,0.4) 70%, rgba(8,7,5,0.7) 100%);
  }
  .bg-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.022;
    background-image: linear-gradient(rgba(207,207,216,0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(207,207,216,0.4) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* 背景流动曲线 */
  .bg-curves { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

  /* 主内容 */
  .main { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }

  /* Logo */
  .logo-wrap { margin-bottom: 56px; filter: drop-shadow(0 2px 16px rgba(0,0,0,0.4)); }

  /* 巨型标题 */
  .title {
    font-weight: 800; font-size: 160px; letter-spacing: -0.02em; line-height: 1;
    background: linear-gradient(180deg,
      #FFFFFF 0%,
      #E8E4E0 18%,
      #C0B8B0 35%,
      #F0ECE8 48%,
      #A8A098 52%,
      #D0C8C0 68%,
      #8A8278 85%,
      #5A544C 100%
    );
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    margin-bottom: 20px;
  }

  .subtitle {
    font-weight: 300; font-size: 36px; letter-spacing: 0.08em; color: var(--text2);
    margin-bottom: 48px;
  }

  /* Tagline */
  .tagline {
    display: flex; align-items: center; gap: 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 16px; letter-spacing: 0.06em; color: var(--text3);
  }
  .tag-dot { width: 5px; height: 5px; border-radius: 50%; }
  .tag-dot-c { background: var(--cyan); box-shadow: 0 0 8px rgba(0,212,170,0.4); }
  .tag-dot-p { background: var(--purple); box-shadow: 0 0 8px rgba(124,92,252,0.4); }

  .tag-sep { width: 1px; height: 16px; background: rgba(207,207,216,0.12); }

  /* 底部 */
  .footer { position: absolute; bottom: 56px; left: 0; right: 0; text-align: center; z-index: 3; }
  .footer-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text3); letter-spacing: 0.08em; }

  /* 液滴装饰 */
  .droplet { position: absolute; border-radius: 50%; pointer-events: none; z-index: 2; }
  @keyframes floatDrop { 0%,100%{transform:translateY(0);opacity:0.10;} 50%{transform:translateY(-8px);opacity:0.20;} }
</style>
</head>
<body>

<div class="bg-base"></div>
<div class="bg-metal"></div>
<div class="bg-brushed"></div>
<div class="bg-vignette"></div>
<div class="bg-grid"></div>

<!-- 背景曲线 -->
<svg class="bg-curves" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFusion" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00D4AA" stop-opacity="0.06"/>
      <stop offset="48%" stop-color="#F5E6C0" stop-opacity="0.08"/>
      <stop offset="52%" stop-color="#F5E6C0" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#7C5CFC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M -100,200 C 260,150 420,280 700,210 C 880,160 1000,300 1100,250 C 1200,200 1360,340 1620,260 C 1780,210 1900,310 2020,260"
        stroke="url(#bgFusion)" stroke-width="0.8" fill="none" opacity="0.35"/>
  <path d="M -80,820 C 300,770 460,890 740,830 C 920,790 1000,910 1100,860 C 1200,810 1340,960 1580,890 C 1740,850 1860,940 2020,890"
        stroke="url(#bgFusion)" stroke-width="0.6" fill="none" opacity="0.25"/>
</svg>

<!-- 液滴 -->
<div class="droplet" style="width:4px;height:4px;top:15%;left:20%;background:radial-gradient(circle at 40% 40%,rgba(0,212,170,0.6) 0%,transparent 70%);animation:floatDrop 8s ease-in-out infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:18%;right:24%;background:radial-gradient(circle at 40% 40%,rgba(124,92,252,0.5) 0%,transparent 70%);animation:floatDrop 9s ease-in-out 2s infinite;"></div>
<div class="droplet" style="width:5px;height:5px;top:12%;left:48%;background:radial-gradient(circle at 40% 40%,rgba(245,230,192,0.5) 0%,transparent 70%);animation:floatDrop 7s ease-in-out 1s infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:84%;left:26%;background:radial-gradient(circle at 40% 40%,rgba(0,212,170,0.5) 0%,transparent 70%);animation:floatDrop 10s ease-in-out 3s infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:82%;right:22%;background:radial-gradient(circle at 40% 40%,rgba(124,92,252,0.5) 0%,transparent 70%);animation:floatDrop 10s ease-in-out 4s infinite;"></div>

<main class="main">

  <!-- Logo -->
  <div class="logo-wrap">
    <svg width="140" height="90" viewBox="0 0 200 100">
      <defs>
        <linearGradient id="lCyan" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00D4AA"/><stop offset="100%" stop-color="#00B894" stop-opacity="0.6"/></linearGradient>
        <linearGradient id="lPurple" x1="100%" y1="0%" x2="0%" y2="0%"><stop offset="0%" stop-color="#7C5CFC"/><stop offset="100%" stop-color="#6A48E0" stop-opacity="0.6"/></linearGradient>
        <radialGradient id="lFusion" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFF8E0" stop-opacity="1"/><stop offset="30%" stop-color="#E8D5A0" stop-opacity="0.85"/><stop offset="100%" stop-color="#E8D5A0" stop-opacity="0"/></radialGradient>
      </defs>
      <path d="M 44,29 C 56,29 64,34 74,42 C 78,44 80,44 80,45 C 80,46 78,46 74,48 C 64,56 56,61 44,61 C 28,61 24,53 24,45 C 24,37 28,29 44,29 Z" fill="url(#lCyan)" opacity="0.9"/>
      <path d="M 156,29 C 144,29 136,34 126,42 C 122,44 120,44 120,45 C 120,46 122,46 126,48 C 136,56 144,61 156,61 C 172,61 176,53 176,45 C 176,37 172,29 156,29 Z" fill="url(#lPurple)" opacity="0.9"/>
      <ellipse cx="100" cy="45" rx="22" ry="16" fill="url(#lFusion)" opacity="0.5"/>
      <ellipse cx="100" cy="45" rx="6" ry="5" fill="#FFF8E0" opacity="0.75"/>
      <path d="M 80,45 Q 90,45 100,45" stroke="#00D4AA" stroke-width="0.5" fill="none" opacity="0.25"/>
      <path d="M 120,45 Q 110,45 100,45" stroke="#7C5CFC" stroke-width="0.5" fill="none" opacity="0.25"/>
    </svg>
  </div>

  <h1 class="title">Alloy</h1>
  <p class="subtitle">AI 编码 Agent 的驾驶舱</p>

  <div class="tagline">
    <div class="tag-dot tag-dot-c"></div>
    <span>OpenSpec</span>
    <div class="tag-sep"></div>
    <span>合金锻造</span>
    <div class="tag-sep"></div>
    <span>Superpowers</span>
    <div class="tag-dot tag-dot-p"></div>
  </div>

</main>

<div class="footer">
  <span class="footer-text">Alloy · OpenSpec + Superpowers · CLI Workflow</span>
</div>

<script>
(function(){
  var W=1920,H=1080;
  function fit(){var s=Math.min(innerWidth/W,innerHeight/H);document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.body.style.width=W+'px';document.body.style.height=H+'px';document.body.style.position='absolute';document.body.style.top=((innerHeight-H*s)/2)+'px';document.body.style.left=((innerWidth-W*s)/2)+'px';}
  fit();window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
