<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>为什么不裸用 AI Agent？</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; } html { width: 100%; height: 100%; background: #060504; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1A1815;
    --cyan: #00E0B4;
    --purple: #9070FF;
    --fusion: #F0DDA8;
    --fusion-bright: #FFF0C8;
    --text: #F8F6F2;
    --text2: #B0ACA6;
    --text3: #807A74;
  }

  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: var(--bg);
    font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* 背景 */
  .bg-base { position: absolute; inset: 0; background: var(--bg); }
  .bg-metal {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 800px 600px at 20% 30%, rgba(60,58,52,0.22) 0%, transparent 100%),
      radial-gradient(ellipse 600px 500px at 80% 70%, rgba(50,48,42,0.14) 0%, transparent 100%),
      radial-gradient(ellipse 1000px 400px at 50% 40%, rgba(232,213,160,0.04) 0%, transparent 55%),
      radial-gradient(ellipse 500px 500px at 25% 55%, rgba(0,212,170,0.02) 0%, transparent 55%),
      radial-gradient(ellipse 500px 500px at 75% 55%, rgba(124,92,252,0.02) 0%, transparent 55%);
  }
  .bg-brushed {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.4;
    background: repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.005) 1px, rgba(255,255,255,0.005) 2px);
  }
  .bg-vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(10,9,7,0.4) 70%, rgba(8,7,5,0.7) 100%);
  }
  .bg-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.022;
    background-image: linear-gradient(rgba(207,207,216,0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(207,207,216,0.4) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* 背景曲线 */
  .bg-curves { position: absolute; inset: 0; pointer-events: none; z-index: 1; }

  /* 页眉 */
  .header {
    position: absolute; top: 56px; left: 50%; transform: translateX(-50%); z-index: 5;
    display: flex; align-items: center; gap: 24px;
  }
  .header-title {
    font-weight: 700; font-size: 48px; letter-spacing: 0.03em;
    background: linear-gradient(180deg, #D8D8E4 0%, #C0C0CE 30%, #E0E0EC 48%, #B0B0BE 52%, #C8C8D6 70%, #A0A0B0 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
  }
  .header-sep { width: 1px; height: 24px; background: rgba(207,207,216,0.12); }
  .header-sub { font-weight: 300; font-size: 24px; letter-spacing: 0.06em; color: var(--text2); }

  /* 痛点卡片 */
  .cards-row {
    position: absolute; top: 200px; left: 50%; transform: translateX(-50%); z-index: 4;
    display: flex; gap: 40px;
  }
  .pain-card {
    width: 380px; padding: 48px 36px 40px;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,0.06);
    background: rgba(20,19,17,0.7);
    backdrop-filter: blur(2px);
    position: relative;
    transition: border-color 0.6s;
  }
  .pain-card::before {
    content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.08), transparent);
  }

  /* 每张卡片独特的强调色 */
  .pc1 { border-color: rgba(0,212,170,0.08); }
  .pc1 .pain-icon svg { --accent: var(--cyan); }
  .pc1 .pain-num { color: rgba(0,212,170,0.55); }
  .pc1 .pain-badge { background: rgba(0,212,170,0.08); color: var(--cyan); }

  .pc2 { border-color: rgba(124,92,252,0.08); }
  .pc2 .pain-icon svg { --accent: var(--purple); }
  .pc2 .pain-num { color: rgba(124,92,252,0.55); }
  .pc2 .pain-badge { background: rgba(124,92,252,0.08); color: var(--purple); }

  .pc3 { border-color: rgba(245,230,192,0.08); }
  .pc3 .pain-icon svg { --accent: var(--fusion-bright); }
  .pc3 .pain-num { color: rgba(245,230,192,0.55); }
  .pc3 .pain-badge { background: rgba(245,230,192,0.08); color: var(--fusion-bright); }

  .pain-badge {
    display: inline-block; padding: 4px 12px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500;
    letter-spacing: 0.06em; margin-bottom: 24px;
  }
  .pain-num {
    font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500;
    letter-spacing: 0.08em; margin-bottom: 16px;
  }
  .pain-title {
    font-weight: 700; font-size: 28px; letter-spacing: 0.03em; color: var(--text);
    margin-bottom: 12px; line-height: 1.3;
  }
  .pain-desc {
    font-weight: 400; font-size: 17px; line-height: 1.7; color: var(--text2);
  }
  .pain-icon {
    margin-bottom: 28px; width: 56px; height: 56px;
  }
  .pain-icon svg { width: 100%; height: 100%; }

  /* 大标题 */
  .main-title {
    position: absolute; top: 120px; left: 50%; transform: translateX(-50%); z-index: 4;
    font-weight: 800; font-size: 64px; letter-spacing: -0.01em;
    background: linear-gradient(180deg, #EDEBE6 0%, #C8C4BE 40%, #EDEBE6 55%, #A0A098 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    text-align: center;
  }

  /* 副标题区 */
  .sub-line {
    position: absolute; top: 186px; left: 50%; transform: translateX(-50%); z-index: 4;
    font-size: 22px; color: var(--text2); letter-spacing: 0.04em; font-weight: 300;
  }

  /* 底部 */
  .footer-bar {
    position: absolute; bottom: 42px; left: 80px; right: 80px; z-index: 4;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-line { flex: 1; height: 1px; background: rgba(207,207,216,0.06); }
  .footer-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.06em; color: var(--text3); padding: 0 32px; white-space: nowrap; }

  /* 液滴 */
  .droplet { position: absolute; border-radius: 50%; pointer-events: none; z-index: 2; }
  @keyframes floatDrop { 0%,100%{transform:translateY(0);opacity:0.10;} 50%{transform:translateY(-8px);opacity:0.20;} }

  /* 问题装饰线 */
  .question-mark {
    position: absolute; z-index: 1; pointer-events: none;
    font-family: 'JetBrains Mono', monospace; font-size: 320px; font-weight: 500;
    color: rgba(0,0,0,0.015);
    top: 90px; left: 100px;
  }
</style>
</head>
<body>

<div class="bg-base"></div>
<div class="bg-metal"></div>
<div class="bg-brushed"></div>
<div class="bg-vignette"></div>
<div class="bg-grid"></div>

<!-- 背景曲线 -->
<svg class="bg-curves" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFusion" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00D4AA" stop-opacity="0.06"/>
      <stop offset="48%" stop-color="#F5E6C0" stop-opacity="0.08"/>
      <stop offset="52%" stop-color="#F5E6C0" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#7C5CFC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M -100,250 C 260,200 420,330 700,260 C 880,210 1000,350 1100,300 C 1200,250 1360,390 1620,310 C 1780,260 1900,360 2020,310"
        stroke="url(#bgFusion)" stroke-width="0.8" fill="none" opacity="0.30"/>
  <path d="M -80,780 C 300,730 460,860 740,800 C 920,760 1000,880 1100,830 C 1200,780 1340,930 1580,860 C 1740,820 1860,910 2020,860"
        stroke="url(#bgFusion)" stroke-width="0.6" fill="none" opacity="0.22"/>
</svg>

<!-- 液滴 -->
<div class="droplet" style="width:4px;height:4px;top:14%;left:18%;background:radial-gradient(circle at 40% 40%,rgba(0,212,170,0.6) 0%,transparent 70%);animation:floatDrop 8s ease-in-out infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:16%;right:20%;background:radial-gradient(circle at 40% 40%,rgba(124,92,252,0.5) 0%,transparent 70%);animation:floatDrop 9s ease-in-out 2s infinite;"></div>
<div class="droplet" style="width:5px;height:5px;top:11%;left:49%;background:radial-gradient(circle at 40% 40%,rgba(245,230,192,0.5) 0%,transparent 70%);animation:floatDrop 7s ease-in-out 1s infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:85%;left:24%;background:radial-gradient(circle at 40% 40%,rgba(0,212,170,0.5) 0%,transparent 70%);animation:floatDrop 10s ease-in-out 3s infinite;"></div>
<div class="droplet" style="width:3px;height:3px;top:83%;right:18%;background:radial-gradient(circle at 40% 40%,rgba(124,92,252,0.5) 0%,transparent 70%);animation:floatDrop 10s ease-in-out 4s infinite;"></div>

<div class="question-mark">?</div>

<!-- 主标题会覆盖在页眉位置之上，用 header-title 风格 -->
<div style="position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:5;">
  <h1 style="font-weight:700;font-size:48px;letter-spacing:0.03em;background:linear-gradient(180deg,#8A8A90 0%,#6A6A70 30%,#909098 48%,#5A5A60 52%,#6A6A70 70%,#4A4A50 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4));">为什么不裸用 AI Agent？</h1>
</div>

<!-- 三张痛点卡片 -->
<div class="cards-row" style="top:190px; gap:50px;">

  <!-- 痛点 1: 需求漂移 -->
  <div class="pain-card pc1">
    <div class="pain-badge">痛点 01</div>
    <div class="pain-icon">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <!-- 漂移箭头: 目标在右上，实际走向偏下 -->
        <circle cx="18" cy="18" r="4" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <circle cx="18" cy="18" r="1.5" fill="var(--accent)" opacity="0.6"/>
        <path d="M 24,22 Q 30,28 28,38" stroke="var(--accent)" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.6"/>
        <path d="M 26,36 L 24,40 L 32,38" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.6"/>
        <!-- 原目标 -->
        <circle cx="42" cy="14" r="6" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1" stroke-dasharray="2,3"/>
        <line x1="44" y1="12" x2="52" y2="4" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
        <line x1="40" y1="16" x2="52" y2="4" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
      </svg>
    </div>
    <div class="pain-title">需求漂移</div>
    <div class="pain-desc">Agent 理解的和你要的不一样，聊着聊着范围就跑。没有结构化的需求锁定，每一轮对话都是一次新的"理解"。</div>
  </div>

  <!-- 痛点 2: 质量靠自觉 -->
  <div class="pain-card pc2">
    <div class="pain-badge">痛点 02</div>
    <div class="pain-icon">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <!-- 骰子/随机性 -->
        <rect x="12" y="12" width="32" height="32" rx="4" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <circle cx="22" cy="22" r="2.5" fill="var(--accent)" opacity="0.4"/>
        <circle cx="34" cy="34" r="2.5" fill="var(--accent)" opacity="0.4"/>
        <circle cx="28" cy="28" r="2.5" fill="var(--accent)" opacity="0.6"/>
        <!-- 问号 -->
        <text x="42" y="16" fill="var(--accent)" opacity="0.8" font-family="JetBrains Mono,monospace" font-size="14" font-weight="500">?</text>
      </svg>
    </div>
    <div class="pain-title">质量靠自觉</div>
    <div class="pain-desc">TDD、code review、分支隔离全看 Agent 心情。没有硬性闸门，质量全凭模型当天的状态和你的提示词运气。</div>
  </div>

  <!-- 痛点 3: 改完不留痕 -->
  <div class="pain-card pc3">
    <div class="pain-badge">痛点 03</div>
    <div class="pain-icon">
      <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <!-- 断裂的日志链 -->
        <rect x="8" y="14" width="14" height="10" rx="2" fill="none" stroke="var(--accent)" stroke-width="1.2" opacity="0.5"/>
        <line x1="12" y1="18" x2="18" y2="18" stroke="var(--accent)" stroke-width="0.8" opacity="0.4"/>
        <line x1="12" y1="22" x2="18" y2="22" stroke="var(--accent)" stroke-width="0.8" opacity="0.4"/>
        <!-- 断裂 -->
        <path d="M 26,14 Q 28,19 22,24" stroke="var(--accent)" stroke-width="1.2" fill="none" opacity="0.6"/>
        <path d="M 22,14 Q 20,19 26,24" stroke="var(--accent)" stroke-width="1.2" fill="none" opacity="0.6"/>
        <!-- 后面的块 -->
        <rect x="30" y="26" width="16" height="10" rx="2" fill="none" stroke="var(--accent)" stroke-width="1.2" opacity="0.3"/>
        <line x1="34" y1="30" x2="42" y2="30" stroke="var(--accent)" stroke-width="0.8" opacity="0.3"/>
      </svg>
    </div>
    <div class="pain-title">改完不留痕</div>
    <div class="pain-desc">代码改了，但"为什么这么改"没记录。换人接手就断片，审核历史、决策理由全部消失在聊天框里。</div>
  </div>

</div>

<!-- 底部 -->
<div class="footer-bar">
  <div class="footer-line"></div>
  <span class="footer-text">Alloy · 为什么需要结构化工作流</span>
  <div class="footer-line"></div>
</div>

<script>
(function(){
  var W=1920,H=1080;
  function fit(){var s=Math.min(innerWidth/W,innerHeight/H);document.body.style.transform='scale('+s+')';document.body.style.transformOrigin='top left';document.body.style.width=W+'px';document.body.style.height=H+'px';document.body.style.position='absolute';document.body.style.top=((innerHeight-H*s)/2)+'px';document.body.style.left=((innerWidth-W*s)/2)+'px';}
  fit();window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
